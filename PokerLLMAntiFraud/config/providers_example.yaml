# =============================================================================
#  providers.yaml — Template for AI provider configuration
# =============================================================================
#  This file lists the AI providers, their accounts, API keys (via environment
#  variables) and the models that are available for fraud detection.
#
#  Environment variable substitution:
#    - The pattern ${VARIABLE_NAME} is replaced at runtime with the value of the
#      corresponding environment variable.
#    - Store sensitive data (account IDs, API keys) in a `.env` file (see below).
#    - Never commit real secrets to version control.
#
#  How to use:
#    1. Copy this file to the `config/` directory of the project.
#    2. Create a `.env` file in the same directory (or set the variables in your
#       system environment).
#    3. Replace the placeholder variables with your actual values.
#
#  Example `.env` file:
#    CLOUDFLARE_ACCOUNT_ID_1=your-account-id
#    CLOUDFLARE_KEY_1=your-api-key
# =============================================================================

providers:
  # Cloudflare Workers AI
  cloudflare:
    name: "Cloudflare AI"                # Human‑readable provider name
    base_url: "https://api.cloudflare.com/client/v4"  # Base URL for the API

    accounts:
      - account_id: "${CLOUDFLARE_ACCOUNT_ID_1}"   # Your Cloudflare account ID
        name: "Primary account"                     # A friendly name for this account

        # API keys associated with this account
        api_keys:
          - key_id: "key-1"                         # Local identifier for this key
            api_key: "${CLOUDFLARE_KEY_1}"          # The actual API key (from env)
            permissions: ["read", "execute"]        # Optional metadata
            rate_limit: 5                           # Optional rate limit info

        # Models available under this account
        models:
          - model_id: "@cf/google/gemma-4-26b-a4b-it"
            display_name: "gemma-4-26b-a4b-it"
            max_tokens: 8192
            compatible_keys: ["key-1"]              # Which api_keys can be used

          - model_id: "@cf/meta/llama-3-8b-instruct"
            display_name: "llama-3-8b-instruct"
            max_tokens: 8192
            compatible_keys: ["key-1"]

          - model_id: "@cf/qwen/qwen3-30b-a3b-fp8"
            display_name: "qwen3-30b-a3b-fp8"
            max_tokens: 8192
            compatible_keys: ["key-1"]

          - model_id: "@cf/nvidia/nemotron-3-120b-a12b"
            display_name: "nemotron-3-120b-a12b"
            max_tokens: 8192
            compatible_keys: ["key-1"]

          - model_id: "@cf/openai/gpt-oss-120b"
            display_name: "gpt-oss-120b"
            max_tokens: 8192
            compatible_keys: ["key-1"]

  # -------------------------------------------------------------------
  #  To add another provider (e.g. OpenAI, Hugging Face), duplicate the
  #  structure below and update the factory + model class accordingly.
  # -------------------------------------------------------------------
